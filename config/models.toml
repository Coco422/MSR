[[models]]
id = "funasr-paraformer-zh"
kind = "asr"
backend = "funasr"
local_path = "models/funasr/paraformer-zh"
device = "cuda"
enabled = false
default = false

[models.options]
batch_size_s = 60
language = "zh"

[[models]]
id = "faster-whisper-large-v3"
kind = "asr"
backend = "faster_whisper"
local_path = "models/faster-whisper/large-v3"
device = "cuda"
enabled = true
default = true

[models.options]
compute_type = "float16"
beam_size = 5

[[models]]
id = "qwen3-asr-0.6b"
kind = "asr"
backend = "qwen_asr"
local_path = "models/qwen/qwen3-asr-0.6b"
device = "cuda"
enabled = true
default = false

[models.options]
engine = "vllm"
gpu_memory_utilization = 0.65
max_inference_batch_size = 16
max_new_tokens = 1024
max_model_len = 16384
forced_aligner_path = "models/qwen/qwen3-forced-aligner-0.6b"
forced_aligner_dtype = "float16"

[[models]]
id = "qwen3-asr-1.7b"
kind = "asr"
